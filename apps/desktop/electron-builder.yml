appId: com.kenv1988.cortexchat
productName: cortexchat
directories:
  output: dist
files:
  - main.js
  - server-entry.js
extraResources:
  # Produced in CI by `pnpm --filter @cortexchat/web deploy` + asset copies;
  # contains the built Next app with real (non-symlinked) node_modules.
  - from: ../../dist-deploy/web
    to: web
win:
  target: nsis
  icon: build/icon.png
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  artifactName: cortexchat-Setup-${version}.${ext}
