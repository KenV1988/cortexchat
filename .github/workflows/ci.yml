name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm comes via corepack (bundled with Node) rather than the
      # third-party pnpm/action-setup action — some account-level Actions
      # policies only allow GitHub-authored actions, and corepack needs no
      # extra permissions anyway.
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @cortexchat/core --filter @cortexchat/providers --filter @cortexchat/db --filter @cortexchat/memory run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build web app
        run: pnpm --filter @cortexchat/web run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cortexchat:ci .
