# cortexchat model registry — the router's escalation ladder.
#
# EVERY model in this default registry costs $0:
#   - ollama models run locally on your own machine (free, private, offline)
#   - openrouter ":free" models are open-source models hosted at no charge —
#     you need an OpenRouter account and API key (https://openrouter.ai/keys),
#     but no payment method. Free-tier models are rate-limited and the exact
#     pool changes over time: browse https://openrouter.ai/models?max_price=0
#     and edit this file (no code changes) if an ID here is retired.
#
# A test (packages/core registryIntegration.test.ts) enforces that this
# default registry stays all-free — adding a paid model here fails CI on
# purpose. Paid providers (OpenAI/Anthropic) remain fully supported by the
# adapters for anyone who wants them: add entries with their cost and
# requires_env and the router will weigh them like anything else.
#
# NOTE: no model below declares "image_understanding", "ocr", or "audio"
# capabilities. Those categories are fully classified by the router but have
# no multimodal adapter wired up yet in this milestone — requests routed to
# them raise a typed NoCapableModelError instead of silently mishandling the
# input. See docs/ARCHITECTURE.md "Known gaps".

models:
  # --- tiny_local: Ollama, near-instant, runs on a laptop CPU ---
  - id: qwen2.5:0.5b
    provider: ollama
    tier: tiny_local
    context_window: 32768
    local: true
    capabilities: [greeting, small_talk, simple_question, translation]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0

  - id: llama3.2:1b
    provider: ollama
    tier: tiny_local
    context_window: 128000
    local: true
    capabilities: [greeting, small_talk, simple_question]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0

  # --- medium_local: Ollama, needs a decent GPU or patient CPU ---
  - id: llama3.1:8b
    provider: ollama
    tier: medium_local
    context_window: 128000
    local: true
    capabilities: [simple_question, programming, math, writing, planning, document_analysis, translation]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0

  - id: qwen2.5:14b
    provider: ollama
    tier: medium_local
    context_window: 32768
    local: true
    capabilities: [programming, math, writing, planning, document_analysis, translation, complex_reasoning]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0

  # --- open_cloud: free-tier open-source models hosted by OpenRouter ---
  - id: meta-llama/llama-3.3-70b-instruct:free
    provider: openrouter
    tier: open_cloud
    context_window: 65536
    local: false
    capabilities: [programming, math, complex_reasoning, research, writing, planning, document_analysis, long_context]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0
    requires_env: OPENROUTER_API_KEY

  - id: qwen/qwen-2.5-72b-instruct:free
    provider: openrouter
    tier: open_cloud
    context_window: 32768
    local: false
    capabilities: [complex_reasoning, programming, math, research, writing, long_context]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0
    requires_env: OPENROUTER_API_KEY

  - id: mistralai/mistral-small-3.1-24b-instruct:free
    provider: openrouter
    tier: open_cloud
    context_window: 32768
    local: false
    capabilities: [programming, writing, planning, translation, document_analysis]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0
    requires_env: OPENROUTER_API_KEY

  # --- premium: the strongest free open-source models (reasoning-class) ---
  - id: deepseek/deepseek-r1:free
    provider: openrouter
    tier: premium
    context_window: 65536
    local: false
    capabilities: [complex_reasoning, research, programming, math, planning, long_context, multi_agent_task]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0
    requires_env: OPENROUTER_API_KEY

  # --- moe: mixture-of-experts (DeepSeek V3 is a genuine MoE architecture) ---
  - id: deepseek/deepseek-chat-v3-0324:free
    provider: openrouter
    tier: moe
    context_window: 65536
    local: false
    capabilities: [multi_agent_task, complex_reasoning, programming, research, long_context]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0
    requires_env: OPENROUTER_API_KEY
