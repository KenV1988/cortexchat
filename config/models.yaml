# cortexchat model registry — the router's escalation ladder.
#
# Edit this file to add/remove/re-tier models with zero code changes. Cost
# figures are illustrative list prices at time of writing; verify current
# pricing with each provider before relying on them for budgeting. Local
# (Ollama) models are free in dollar terms — their cost is electricity, which
# the router does not currently meter (see docs/ARCHITECTURE.md roadmap).
#
# NOTE: no model below declares "image_understanding", "ocr", or "audio"
# capabilities. Those categories are fully classified by the router but have
# no multimodal adapter wired up yet in this milestone — requests routed to
# them raise a typed NoCapableModelError instead of silently mishandling the
# input. See docs/ARCHITECTURE.md "Known gaps" before adding vision models
# here without also wiring image upload through apps/web.

models:
  # --- tiny_local: Ollama, near-instant, runs on a laptop CPU ---
  - id: qwen2.5:0.5b
    provider: ollama
    tier: tiny_local
    context_window: 32768
    local: true
    capabilities: [greeting, small_talk, simple_question, translation]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0

  - id: llama3.2:1b
    provider: ollama
    tier: tiny_local
    context_window: 128000
    local: true
    capabilities: [greeting, small_talk, simple_question]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0

  # --- medium_local: Ollama, needs a decent GPU or patient CPU ---
  - id: llama3.1:8b
    provider: ollama
    tier: medium_local
    context_window: 128000
    local: true
    capabilities: [simple_question, programming, math, writing, planning, document_analysis, translation]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0

  - id: qwen2.5:14b
    provider: ollama
    tier: medium_local
    context_window: 32768
    local: true
    capabilities: [programming, math, writing, planning, document_analysis, translation, complex_reasoning]
    cost_per_mtok_in: 0
    cost_per_mtok_out: 0

  # --- open_cloud: OpenRouter, cheap open-weight models hosted at scale ---
  - id: deepseek/deepseek-chat
    provider: openrouter
    tier: open_cloud
    context_window: 64000
    local: false
    capabilities: [programming, math, complex_reasoning, research, writing, planning, document_analysis, long_context]
    cost_per_mtok_in: 0.27
    cost_per_mtok_out: 1.10
    requires_env: OPENROUTER_API_KEY

  - id: qwen/qwen-2.5-72b-instruct
    provider: openrouter
    tier: open_cloud
    context_window: 32768
    local: false
    capabilities: [complex_reasoning, programming, math, research, long_context]
    cost_per_mtok_in: 0.35
    cost_per_mtok_out: 0.40
    requires_env: OPENROUTER_API_KEY

  # --- premium: direct frontier APIs ---
  - id: gpt-4.1-mini
    provider: openai
    tier: premium
    context_window: 1000000
    local: false
    capabilities: [complex_reasoning, research, programming, math, writing, planning, document_analysis, long_context]
    cost_per_mtok_in: 0.40
    cost_per_mtok_out: 1.60
    requires_env: OPENAI_API_KEY

  - id: claude-sonnet-5
    provider: anthropic
    tier: premium
    context_window: 200000
    local: false
    capabilities: [complex_reasoning, research, programming, math, writing, planning, document_analysis, long_context, multi_agent_task]
    cost_per_mtok_in: 3.00
    cost_per_mtok_out: 15.00
    requires_env: ANTHROPIC_API_KEY

  - id: claude-opus-4-8
    provider: anthropic
    tier: premium
    context_window: 200000
    local: false
    capabilities: [multi_agent_task, complex_reasoning, research, long_context]
    cost_per_mtok_in: 15.00
    cost_per_mtok_out: 75.00
    requires_env: ANTHROPIC_API_KEY

  # --- moe: mixture-of-experts, reserved for genuinely multi-part tasks ---
  - id: mistralai/mixtral-8x22b-instruct
    provider: openrouter
    tier: moe
    context_window: 65536
    local: false
    capabilities: [multi_agent_task, complex_reasoning, long_context]
    cost_per_mtok_in: 0.65
    cost_per_mtok_out: 0.65
    requires_env: OPENROUTER_API_KEY
